<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videography</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navigation ─────────────────────────────────── -->
  <nav id="site-nav" class="solid">
    <a class="nav-name" id="nav-name-link" href="index.html">YOUR NAME</a>

    <ul class="nav-links" id="nav-links"></ul>

    <button class="nav-hamburger" id="hamburger-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Overlay -->
  <div class="nav-mobile-overlay" id="mobile-overlay"></div>

  <!-- ── Videography ────────────────────────────────── -->
  <main class="page-content">
    <div class="container">

      <header class="page-header fade-in">
        <p>COMMERCIAL WORK</p>
        
      </header>

      
      <div class="video-grid" id="video-grid">
        <!-- rendered by JS -->
      </div>

    </div>
  </main>

  <footer>
    <span id="footer-name"></span>
    <span id="footer-year"></span>
  </footer>

  <style>
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>

  <!-- Scripts -->
  <script src="data/config.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script>
    renderNav();
    document.title = 'Videography — ' + CONFIG.name;
    document.getElementById('footer-name').textContent = CONFIG.name;
    document.getElementById('footer-year').textContent = '© ' + new Date().getFullYear();

   
    /* ── Render video grid ── */
    const grid = document.getElementById('video-grid');

    function renderVideos() {
      grid.innerHTML = '';
      const filtered = CONFIG.videography;

      filtered.forEach((vid, i) => {
        const card = document.createElement('article');
        card.className = 'video-card fade-in';
        card.style.transitionDelay = (i * 0.07) + 's';
        card.innerHTML = `
          <div class="vimeo-wrapper">
    	    <iframe
             src="https://player.vimeo.com/video/${vid.vimeoId}?color=c8a96e&title=0&byline=0&portrait=0"
             allow="autoplay; fullscreen; picture-in-picture; allowfullscreen"
             title="${vid.title}">
            </iframe>
          </div>
          <div class="video-card-info">
            <h3>${vid.title}</h3>
          </div>
        `;
        grid.appendChild(card);
      });

      // Re-trigger fade-in observer
      document.querySelectorAll('.fade-in:not(.visible)').forEach(el => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
          });
        }, { threshold: 0.05 });
        obs.observe(el);
      });
    }

    renderVideos();
  </script>
</body>
</html>
